name: Docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/build-docs.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pages
        # NOTE: Pages must be enabled manually once in repo Settings → Pages
        # → Source: "GitHub Actions". The default GITHUB_TOKEN can't create the
        # site via API even with pages:write, so 'enablement: true' is a no-op
        # in practice; we omit it to avoid the confusing error.
        uses: actions/configure-pages@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore + build
        run: |
          dotnet restore Configurite.slnx
          dotnet build Configurite.slnx --configuration Release --no-restore

      - name: Build DocFX site
        run: |
          chmod +x scripts/build-docs.sh
          scripts/build-docs.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
