name: Docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/build-docs.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pages
        # =====================================================================
        # ONE-TIME REPO SETUP REQUIRED before this workflow can succeed:
        #
        #   1. Settings → Pages → Source: "GitHub Actions"  (UI step)
        #   2. RUN ONCE from your machine with gh CLI auth:
        #        gh api repos/<owner>/<repo>/pages -X POST -F build_type=workflow
        #
        # Step 1 alone does NOT actually instantiate the Pages site server-side
        # (you can verify: GET /repos/<owner>/<repo>/pages returns 404). The
        # POST in step 2 creates the Pages object. Both steps must be done.
        #
        # 'enablement: true' on configure-pages would automate step 2, but the
        # default GITHUB_TOKEN lacks the repo admin permissions needed for
        # POST /pages — it returns "Resource not accessible by integration".
        # We removed the flag to avoid that misleading error; one-time manual
        # setup is the supported pattern in GitHub's own examples.
        # =====================================================================
        uses: actions/configure-pages@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore + build
        run: |
          dotnet restore Configurite.slnx
          dotnet build Configurite.slnx --configuration Release --no-restore

      - name: Build DocFX site
        run: |
          chmod +x scripts/build-docs.sh
          scripts/build-docs.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
