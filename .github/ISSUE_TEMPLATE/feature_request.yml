name: Feature request
description: Suggest a new feature or enhancement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem you're trying to solve?
      description: Describe the use case, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: API sketch, command-line shape, UI screenshot — whatever helps.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
