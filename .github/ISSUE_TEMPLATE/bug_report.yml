name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Security vulnerabilities**: Please use [GitHub Security Advisories](../../security/advisories/new) instead of this form.

  - type: input
    id: configurite-version
    attributes:
      label: Configurite version
      placeholder: "8.6.1 / 9.6.1 / 10.6.1"
    validations:
      required: true

  - type: dropdown
    id: tfm
    attributes:
      label: Target framework
      options:
        - net8.0
        - net9.0
        - net10.0
        - other
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      multiple: true
      options:
        - Configurite (provider)
        - Configurite.Cli
        - Configurite.AdminUI
        - Configurite.Postgres
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest possible code or commands that reproduce the problem.
      render: csharp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Stack traces, exception messages, log output — wrap in code fences.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, anything else relevant.
      placeholder: "macOS 15.4, .NET 10.0.203"
